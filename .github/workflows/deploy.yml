name: Deploy KDPD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        default: production
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Write .env from secrets
        shell: bash
        run: |
          cat > .env <<'EOF'
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          MAIL_SUBJECT_PREFIX=${{ secrets.MAIL_SUBJECT_PREFIX }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          SESSION_SECURE=${{ secrets.SESSION_SECURE }}
          TRUST_PROXY=${{ secrets.TRUST_PROXY }}
          DUE_SOON_DAYS=${{ secrets.DUE_SOON_DAYS }}
          NOTIFICATIONS_JOB_INTERVAL_MS=${{ secrets.NOTIFICATIONS_JOB_INTERVAL_MS }}
          EOF

      - name: Copy build and env to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: |
            dist/**
            .env
            package.json
            package-lock.json
          target: /apps/KDPD_PRJ_MNG
          overwrite: true

      - name: Install server deps and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo /usr/bin/systemctl daemon-reload || true
            sudo /usr/local/bin/kdpd-env-update
            cd /apps/KDPD_PRJ_MNG
            npm ci --omit=dev
            sudo /usr/bin/systemctl restart kdpd
            sudo /usr/bin/systemctl status kdpd --no-pager || true
